<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="f-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </linearGradient>
  </defs>

  <rect width="900" height="200" fill="url(#f-bg)" rx="10"/>

  <!-- Grid -->
  <g opacity="0.03" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="50" x2="900" y2="50"/><line x1="0" y1="100" x2="900" y2="100"/><line x1="0" y1="150" x2="900" y2="150"/>
  </g>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#4a5568" letter-spacing="3">USER ONBOARDING FLOW</text>

  <!-- Step 1: Google Sign In -->
  <g>
    <rect x="20" y="55" width="140" height="65" rx="10" fill="#1e293b" stroke="#2563eb" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="1;0.3;1" dur="3s" repeatCount="indefinite"/>
    </rect>
    <circle cx="55" cy="80" r="4" fill="#ea4335" opacity="0.8"/><circle cx="65" cy="80" r="4" fill="#4285f4" opacity="0.8"/>
    <circle cx="75" cy="80" r="4" fill="#fbbc04" opacity="0.8"/><circle cx="85" cy="80" r="4" fill="#34a853" opacity="0.8"/>
    <text x="90" y="105" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0">Google Sign-In</text>
  </g>

  <!-- Arrow 1 -->
  <path id="fp1" d="M160,87 L210,87" fill="none" stroke="#60a5fa" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" repeatCount="indefinite"/>
  </path>
  <circle r="2.5" fill="#60a5fa" opacity="0.8"><animateMotion dur="1.5s" repeatCount="indefinite"><mpath href="#fp1"/></animateMotion></circle>

  <!-- Step 2: Pick Institution -->
  <g>
    <rect x="210" y="55" width="140" height="65" rx="10" fill="#1e293b" stroke="#a78bfa" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="1;0.3;1" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="255" y="82" font-family="monospace" font-size="14" fill="#a78bfa" opacity="0.7">ABC123</text>
    <text x="280" y="105" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0">Enter Inst. Code</text>
  </g>

  <!-- Arrow 2 -->
  <path id="fp2" d="M350,87 L400,87" fill="none" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
  </path>
  <circle r="2.5" fill="#a78bfa" opacity="0.8"><animateMotion dur="1.5s" begin="0.3s" repeatCount="indefinite"><mpath href="#fp2"/></animateMotion></circle>

  <!-- Step 3: Pending -->
  <g>
    <rect x="400" y="55" width="140" height="65" rx="10" fill="#1e293b" stroke="#f59e0b" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="1;0.3;1" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <circle cx="440" cy="82" r="8" fill="none" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <text x="440" y="86" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#f59e0b">!</text>
    <text x="470" y="105" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0">Pending State</text>
  </g>

  <!-- Arrow 3 -->
  <path id="fp3" d="M540,87 L590,87" fill="none" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
  </path>
  <circle r="2.5" fill="#f59e0b" opacity="0.8"><animateMotion dur="1.5s" begin="0.6s" repeatCount="indefinite"><mpath href="#fp3"/></animateMotion></circle>

  <!-- Step 4: Admin Approves -->
  <g>
    <rect x="590" y="55" width="140" height="65" rx="10" fill="#1e293b" stroke="#34d399" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="1;0.3;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <text x="635" y="85" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#34d399" opacity="0.7">&#x2713;</text>
    <text x="660" y="105" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0">Admin Approves</text>
  </g>

  <!-- Arrow 4 -->
  <path id="fp4" d="M730,87 L780,87" fill="none" stroke="#34d399" stroke-width="1.2" stroke-dasharray="4,3" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-14" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
  </path>
  <circle r="2.5" fill="#34d399" opacity="0.8"><animateMotion dur="1.5s" begin="0.9s" repeatCount="indefinite"><mpath href="#fp4"/></animateMotion></circle>

  <!-- Step 5: Dashboard -->
  <g>
    <rect x="780" y="55" width="100" height="65" rx="10" fill="#1e293b" stroke="#60a5fa" stroke-width="1" opacity="0.9">
      <animate attributeName="stroke-opacity" values="1;0.3;1" dur="3s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Dashboard icon -->
    <rect x="812" y="72" width="10" height="8" rx="1" fill="#60a5fa" opacity="0.5"/>
    <rect x="825" y="68" width="10" height="12" rx="1" fill="#a78bfa" opacity="0.5"/>
    <rect x="812" y="83" width="23" height="6" rx="1" fill="#34d399" opacity="0.4"/>
    <text x="830" y="105" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#e2e8f0">Dashboard</text>
  </g>

  <!-- Bottom labels -->
  <text x="90" y="145" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#475569">OAuth 2.0</text>
  <text x="280" y="145" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#475569">Institution lookup</text>
  <text x="470" y="145" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#475569">Awaiting approval</text>
  <text x="660" y="145" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#475569">Role assignment</text>
  <text x="830" y="145" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#475569">Role-based view</text>

  <!-- Time indicator -->
  <line x1="50" y1="170" x2="850" y2="170" stroke="#1e293b" stroke-width="1"/>
  <circle cx="50" cy="170" r="3" fill="#2563eb"/>
  <circle cx="850" cy="170" r="3" fill="#60a5fa">
    <animate attributeName="fill" values="#60a5fa;#34d399;#60a5fa" dur="2s" repeatCount="indefinite"/>
  </circle>
  <rect x="50" y="168" width="0" height="4" rx="2" fill="#60a5fa" opacity="0.6">
    <animate attributeName="width" values="0;800;0" dur="6s" repeatCount="indefinite"/>
  </rect>
  <text x="450" y="192" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#374151" letter-spacing="2">TYPICAL FLOW: 30 SECONDS TO DASHBOARD</text>
</svg>
