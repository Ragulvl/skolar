<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#0f1628"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </linearGradient>

    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa">
        <animate attributeName="stop-color" values="#60a5fa;#a78bfa;#60a5fa" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#a78bfa">
        <animate attributeName="stop-color" values="#a78bfa;#f472b6;#a78bfa" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f472b6">
        <animate attributeName="stop-color" values="#f472b6;#60a5fa;#f472b6" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="line-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0"/>
      <stop offset="50%" stop-color="#a78bfa" stop-opacity="0.6">
        <animate attributeName="stop-opacity" values="0.6;0.3;0.6" dur="3s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glow-1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="glow-2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </radialGradient>

    <filter id="text-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="soft-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)" rx="10"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="40" x2="900" y2="40"/>
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
    <line x1="0" y1="200" x2="900" y2="200"/>
    <line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="100" y1="0" x2="100" y2="280"/>
    <line x1="200" y1="0" x2="200" y2="280"/>
    <line x1="300" y1="0" x2="300" y2="280"/>
    <line x1="400" y1="0" x2="400" y2="280"/>
    <line x1="500" y1="0" x2="500" y2="280"/>
    <line x1="600" y1="0" x2="600" y2="280"/>
    <line x1="700" y1="0" x2="700" y2="280"/>
    <line x1="800" y1="0" x2="800" y2="280"/>
  </g>

  <!-- Ambient glow spots -->
  <ellipse cx="250" cy="140" rx="200" ry="120" fill="url(#glow-1)" filter="url(#soft-glow)">
    <animate attributeName="cx" values="250;300;250" dur="8s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="650" cy="140" rx="180" ry="100" fill="url(#glow-2)" filter="url(#soft-glow)">
    <animate attributeName="cx" values="650;600;650" dur="10s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Floating orbs -->
  <circle cx="80" cy="60" r="3" fill="#60a5fa" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.15;0.5" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="60;50;60" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="160" cy="210" r="2" fill="#a78bfa" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" begin="1s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="210;200;210" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="45" r="2.5" fill="#f472b6" opacity="0.35">
    <animate attributeName="opacity" values="0.35;0.1;0.35" dur="5s" begin="0.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="45;38;45" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="240" r="2" fill="#60a5fa" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.08;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="240;232;240" dur="5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="720" cy="55" r="3" fill="#a78bfa" opacity="0.4">
    <animate attributeName="opacity" values="0.4;0.12;0.4" dur="3.5s" begin="1.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="55;47;55" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="830" cy="180" r="2" fill="#f472b6" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.08;0.3" dur="5s" begin="0.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="180;172;180" dur="4.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="250" r="1.5" fill="#60a5fa" opacity="0.25">
    <animate attributeName="opacity" values="0.25;0.06;0.25" dur="4.5s" begin="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="620" cy="35" r="1.8" fill="#a78bfa" opacity="0.3">
    <animate attributeName="opacity" values="0.3;0.1;0.3" dur="3.8s" begin="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Graduation cap icon (subtle) -->
  <g transform="translate(65, 130)" opacity="0.06">
    <polygon points="0,10 20,0 40,10 20,20" fill="#60a5fa"/>
    <line x1="20" y1="10" x2="20" y2="28" stroke="#60a5fa" stroke-width="1.5"/>
    <path d="M10,14 Q10,24 20,28 Q30,24 30,14" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  </g>

  <g transform="translate(790, 85)" opacity="0.05">
    <polygon points="0,10 20,0 40,10 20,20" fill="#a78bfa"/>
    <line x1="20" y1="10" x2="20" y2="28" stroke="#a78bfa" stroke-width="1.5"/>
    <path d="M10,14 Q10,24 20,28 Q30,24 30,14" fill="none" stroke="#a78bfa" stroke-width="1.5"/>
  </g>

  <!-- Title -->
  <text x="450" y="125" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="68" font-weight="700" fill="url(#title-grad)" filter="url(#text-glow)" letter-spacing="6">SKOLAR</text>

  <!-- Subtitle -->
  <text x="450" y="165" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#7c8a9e" letter-spacing="6" font-weight="400">LEARNING MANAGEMENT SYSTEM</text>

  <!-- Accent line -->
  <line x1="310" y1="185" x2="590" y2="185" stroke="url(#line-grad)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Tagline -->
  <text x="450" y="212" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#4a5568" letter-spacing="1">Schools and Colleges under one platform</text>

  <!-- Version badge -->
  <g transform="translate(380, 228)">
    <rect width="140" height="22" rx="11" fill="#161b2e" stroke="#2a3042" stroke-width="0.8"/>
    <text x="70" y="15" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#7c8a9e">React 19 + Express 4</text>
  </g>
</svg>
