<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <defs>
    <linearGradient id="a-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </linearGradient>

    <!-- Node gradients -->
    <linearGradient id="node-react" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#172033"/>
    </linearGradient>
    <linearGradient id="node-express" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#1c1f33"/>
    </linearGradient>
    <linearGradient id="node-db" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#17262e"/>
    </linearGradient>
    <linearGradient id="node-auth" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#2a1f28"/>
    </linearGradient>
    <linearGradient id="node-jwt" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#1a2530"/>
    </linearGradient>

    <!-- Glow filters per color -->
    <filter id="glow-blue" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#60a5fa" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#34d399" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-pink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#f472b6" stroke-width="1.2"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#22d3ee" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="420" fill="url(#a-bg)" rx="10"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#60a5fa" stroke-width="0.5">
    <line x1="0" y1="60" x2="900" y2="60"/><line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="180" x2="900" y2="180"/><line x1="0" y1="240" x2="900" y2="240"/>
    <line x1="0" y1="300" x2="900" y2="300"/><line x1="0" y1="360" x2="900" y2="360"/>
    <line x1="150" y1="0" x2="150" y2="420"/><line x1="300" y1="0" x2="300" y2="420"/>
    <line x1="450" y1="0" x2="450" y2="420"/><line x1="600" y1="0" x2="600" y2="420"/>
    <line x1="750" y1="0" x2="750" y2="420"/>
  </g>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#4a5568" letter-spacing="4" font-weight="500">SYSTEM ARCHITECTURE</text>

  <!-- ========== CONNECTION PATHS ========== -->

  <!-- React -> Express (horizontal) -->
  <path id="path-re" d="M268,155 L380,155" fill="none" stroke="#60a5fa" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-blue)" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="#60a5fa" opacity="0.9">
    <animateMotion dur="2s" repeatCount="indefinite"><mpath href="#path-re"/></animateMotion>
  </circle>

  <!-- Express -> PostgreSQL (horizontal) -->
  <path id="path-ep" d="M570,155 L638,155" fill="none" stroke="#34d399" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-green)" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="#34d399" opacity="0.9">
    <animateMotion dur="2s" begin="0.5s" repeatCount="indefinite"><mpath href="#path-ep"/></animateMotion>
  </circle>

  <!-- Express -> Google OAuth (down) -->
  <path id="path-ea" d="M475,195 L475,255 L380,255 L380,280" fill="none" stroke="#f472b6" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-pink)" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="2.5s" begin="1s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="#f472b6" opacity="0.9">
    <animateMotion dur="2.5s" begin="1s" repeatCount="indefinite"><mpath href="#path-ea"/></animateMotion>
  </circle>

  <!-- Express -> JWT (down) -->
  <path id="path-ej" d="M475,195 L475,255 L580,255 L580,280" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="6,4" marker-end="url(#arrow-cyan)" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;-20" dur="2.5s" begin="1.5s" repeatCount="indefinite"/>
  </path>
  <circle r="3" fill="#22d3ee" opacity="0.9">
    <animateMotion dur="2.5s" begin="1.5s" repeatCount="indefinite"><mpath href="#path-ej"/></animateMotion>
  </circle>

  <!-- ========== CONNECTION LABELS ========== -->
  <rect x="290" y="133" width="60" height="16" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.8"/>
  <text x="320" y="144" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#60a5fa">REST API</text>

  <rect x="580" y="133" width="55" height="16" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.8"/>
  <text x="607" y="144" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#34d399">Prisma</text>

  <rect x="400" y="237" width="66" height="16" rx="3" fill="#111827" stroke="#1e293b" stroke-width="0.8"/>
  <text x="433" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="8" fill="#a78bfa">Passport.js</text>

  <!-- ========== NODES ========== -->

  <!-- React Frontend -->
  <g>
    <rect x="78" y="105" width="190" height="100" rx="12" fill="url(#node-react)" stroke="#2563eb" stroke-width="1.2" opacity="0.95">
      <animate attributeName="stroke-opacity" values="1;0.4;1" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- React icon -->
    <circle cx="120" cy="140" r="10" fill="none" stroke="#60a5fa" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="120" cy="140" rx="18" ry="7" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.5" transform="rotate(0,120,140)"/>
    <ellipse cx="120" cy="140" rx="18" ry="7" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.5" transform="rotate(60,120,140)"/>
    <ellipse cx="120" cy="140" rx="18" ry="7" fill="none" stroke="#60a5fa" stroke-width="0.8" opacity="0.5" transform="rotate(120,120,140)"/>
    <circle cx="120" cy="140" r="2.5" fill="#60a5fa"/>

    <text x="160" y="137" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e2e8f0" font-weight="600">React SPA</text>
    <text x="160" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b">Vite 8 + Tailwind v4</text>
    <text x="100" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#475569">13 role-based dashboards</text>
  </g>

  <!-- Express API -->
  <g>
    <rect x="380" y="105" width="190" height="100" rx="12" fill="url(#node-express)" stroke="#7c3aed" stroke-width="1.2" opacity="0.95">
      <animate attributeName="stroke-opacity" values="1;0.4;1" dur="4s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <!-- Express-like brackets icon -->
    <text x="408" y="147" font-family="monospace" font-size="22" fill="#a78bfa" opacity="0.7">{ }</text>

    <text x="448" y="137" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e2e8f0" font-weight="600">Express API</text>
    <text x="448" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b">Node.js + REST</text>
    <text x="400" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#475569">13 controllers, auth middleware</text>
  </g>

  <!-- PostgreSQL -->
  <g>
    <rect x="638" y="105" width="190" height="100" rx="12" fill="url(#node-db)" stroke="#059669" stroke-width="1.2" opacity="0.95">
      <animate attributeName="stroke-opacity" values="1;0.4;1" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <!-- DB icon -->
    <ellipse cx="675" cy="133" rx="14" ry="6" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.7"/>
    <path d="M661,133 L661,150 Q661,156 675,156 Q689,156 689,150 L689,133" fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.7"/>
    <ellipse cx="675" cy="150" rx="14" ry="6" fill="none" stroke="#34d399" stroke-width="0.7" opacity="0.4"/>

    <text x="700" y="137" font-family="'Segoe UI', Arial, sans-serif" font-size="15" fill="#e2e8f0" font-weight="600">PostgreSQL</text>
    <text x="700" y="155" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b">Prisma ORM v6</text>
    <text x="658" y="185" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#475569">15 models, indexed queries</text>
  </g>

  <!-- Google OAuth -->
  <g>
    <rect x="288" y="280" width="180" height="85" rx="12" fill="url(#node-auth)" stroke="#db2777" stroke-width="1.2" opacity="0.95">
      <animate attributeName="stroke-opacity" values="1;0.4;1" dur="4s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Google-like colored dots -->
    <circle cx="320" cy="313" r="4" fill="#ea4335" opacity="0.8"/>
    <circle cx="330" cy="313" r="4" fill="#4285f4" opacity="0.8"/>
    <circle cx="340" cy="313" r="4" fill="#fbbc04" opacity="0.8"/>
    <circle cx="350" cy="313" r="4" fill="#34a853" opacity="0.8"/>

    <text x="370" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e2e8f0" font-weight="600">Google OAuth</text>
    <text x="310" y="345" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#475569">Passport.js strategy, session mgmt</text>
  </g>

  <!-- JWT + Cookies -->
  <g>
    <rect x="490" y="280" width="180" height="85" rx="12" fill="url(#node-jwt)" stroke="#0891b2" stroke-width="1.2" opacity="0.95">
      <animate attributeName="stroke-opacity" values="1;0.4;1" dur="4s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Lock icon -->
    <rect x="520" y="310" width="16" height="12" rx="2" fill="none" stroke="#22d3ee" stroke-width="1.3" opacity="0.7"/>
    <path d="M523,310 L523,304 Q523,298 528,298 Q533,298 533,304 L533,310" fill="none" stroke="#22d3ee" stroke-width="1.3" opacity="0.7"/>

    <text x="545" y="318" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#e2e8f0" font-weight="600">JWT Auth</text>
    <text x="510" y="345" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#475569">Token cookies, 60s user cache</text>
  </g>

  <!-- Bottom info bar -->
  <rect x="200" y="390" width="500" height="20" rx="10" fill="#111827" stroke="#1e293b" stroke-width="0.8" opacity="0.8"/>
  <text x="450" y="404" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="9" fill="#64748b" letter-spacing="1">FRONTEND :5173  |  BACKEND :5000  |  GOOGLE OAUTH  |  PRISMA ORM</text>
</svg>
